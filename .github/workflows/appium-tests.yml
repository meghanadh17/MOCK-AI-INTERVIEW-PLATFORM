name: Appium Android E2E Automated Test Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  appium-e2e-tests:
    name: Run Appium Android E2E Tests & Generate Excel Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies for Excel Generation
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Install Appium Test Dependencies
        run: |
          cd frontend/appium-tests
          npm install

      - name: Execute Automated Appium Android E2E Tests
        run: |
          cd frontend/appium-tests
          node tests/run_all_e2e_tests.js

      - name: Generate Appium E2E Excel Analysis Report
        run: |
          cd frontend/appium-tests
          python generate_excel_report.py

      - name: Upload Appium Excel Test Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MockAI-Android-Appium-E2E-Analysis-Report
          path: |
            frontend/appium-tests/MockAI_Android_E2E_Appium_Test_Suite_Analysis.xlsx
            frontend/appium-tests/test_execution_results.json
          retention-days: 30
