name: E2E & Web Selenium Automated Test Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  selenium-e2e-tests:
    name: Run Web Selenium E2E Tests & Generate Excel Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies for Excel Generation
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Install Web Application Dependencies & Build
        run: |
          cd web
          npm install
          npm run build

      - name: Start Web Application Preview Server in Background
        run: |
          cd web
          npm run preview -- --port 5173 &
          sleep 5

      - name: Install Web Selenium Test Dependencies
        run: |
          cd web/selenium-tests
          npm install

      - name: Install Chrome Browser & ChromeDriver
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Execute Automated Web Selenium E2E Tests (Headless)
        env:
          HEADLESS: "true"
          TEST_BASE_URL: "http://localhost:5173"
        run: |
          cd web/selenium-tests
          node tests/run_all_e2e_tests.js

      - name: Generate Web Selenium E2E Excel Analysis Report
        run: |
          cd web/selenium-tests
          python generate_excel_report.py

      - name: Upload Web Selenium Excel Test Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MockAI-Web-Selenium-E2E-Analysis-Report
          path: |
            web/selenium-tests/MockAI_Web_E2E_Selenium_Test_Suite_Analysis.xlsx
            web/selenium-tests/test_execution_results.json
          retention-days: 30
