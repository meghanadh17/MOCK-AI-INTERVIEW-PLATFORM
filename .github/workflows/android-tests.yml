name: Android App CI & Build Verification

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android App & Run Diagnostics
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v3

      - name: Make Gradle Wrapper Executable
        run: chmod +x frontend/gradlew

      - name: Run Kotlin Compilation Check
        run: |
          cd frontend
          ./gradlew :app:compileDebugKotlin

      - name: Assemble Debug APK
        run: |
          cd frontend
          ./gradlew assembleDebug

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MockAI-Android-Debug-APK
          path: frontend/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
