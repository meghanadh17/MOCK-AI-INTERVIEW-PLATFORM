version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: mocrai_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: mocrai_web
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    environment:
      - MYSQL_SERVER=host.docker.internal
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=
      - MYSQL_DB=mocrai
      - REDIS_HOST=redis
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker:
    build: .
    container_name: mocrai_worker
    restart: always
    command: celery -A app.tasks.celery_app worker --loglevel=info
    volumes:
      - .:/app
      - uploads_data:/app/uploads
    environment:
      - MYSQL_SERVER=host.docker.internal
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=
      - MYSQL_DB=mocrai
      - REDIS_HOST=redis
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  redis_data:
  uploads_data:
